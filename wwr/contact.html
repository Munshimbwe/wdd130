<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Ready to hit the rapids? Get in touch with Whitewater Rafting Company.Fill out our contact form for reservations and trip details. Adventure awaits!">
    <meta name="author" content="Munshimbwe Kafwanka">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <a href="index.html" class="logo-link">
            <img src="images/z-wwr-blue.webp" alt="Rafting Logo">
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="company-info">
            <h1>White Water Rafting</h1>
            <address>
                123 Main River Street<br>
                Kolob, Kabwe<br>
                +260 078 234 2222<br>
                <a href="mailto:info@whitewater.com">info@whitewater.com</a>
            </address>
        </section>

        <!-- Main Content Grid -->
        <div class="contact-grid">
            <section id="map">
                
                <iframe src="https://maps.app.goo.gl/cWWavBz3Cnoz9E5ZA" width="100%" height="450"
                  allowfullscreen="" loading="lazy">
                </iframe>
            </section>

            <section id="form-section">
                <form action="thanks.html" method="post">
                    <div class="form-item">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="user_name" placeholder="Name" required>
                    </div>

                    <div class="form-item">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="user_email" placeholder="Email"
                          required>
                    </div>

                    <fieldset>
                        <legend>Message Purpose</legend>
                        l
                        <label for="general">
                            <input type="radio" name="purpose" value="general" checked> General
                            Inquiry
                        </label>
                        <label for="reservation">
                            <input type="radio" name="purpose" value="reservation"> Reservation
                            Question
                        </label>
                        <label for="suggestion">
                            <input type="radio" name="purpose" value="suggestion"> Website
                            Suggestion
                        </label>
                    </fieldset>

                    <div class="form-item">
                        <label for="message">Message</label>
                        <textarea id="message" name="user_message"
                          placeholder="Type here"></textarea>
                    </div>

                    <div class="checkbox-container">
                        <input type="checkbox" id="newsletter" name="subscribe" checked>
                        <label for="newsletter">Please Subscribe me to the monthly
                            newsletter</label>
                    </div>

                    <button type="submit">Get in Touch!</button>
                </form>
            </section>
        </div>

        <!-- Employee Section -->
        <section id="employee-section">
            <h2>We Are Here To Serve You</h2>
            <div class="employee-container">
                <figure>
                    <img src="images/rafting64_1024.jpg" alt="Employee Profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/rafting20_600.jpg" alt="Employee Profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/rafting47_600.webp" alt="Employee Profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ⚒️ White Water Rafting ⚒️ Kabwe, Zambia ⚒️</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook">Follow Us On Facebook</a>
            <a href="https://instagram.com"><img src="images/instagram-square.svg"
                  alt="Instagram">Follow Us On Instagram</a>
            <a href="https://x.com"><img src="images/x-bw.svg" alt="X Icon">Follow Us On X</a>
        </nav>
    </footer>

</body>

</html>
