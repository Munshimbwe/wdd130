<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll</title>
    <link rel="stylesheet" href="styles/poll-form.css">

</head>
<body>
    
</body>  
<main>
     <form>
        <h1>Contact information</h1>
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required>
        <label for="usermail">Email:</label>
        <input type="email" id="useremail" name="usermail" required>

        <label for="quantity">Select Quantity</label>
        <select name="quantity" id="quantity">
            <option value="1">One</option>
            <option value="2">Two</option>
            <option value="3">Three</option>
        </select>
        <h1>Questions </h1>

        <label for="browser">What is your favorite internet browser?</label>
        <select id="browser" name="browser">
            <option value="chrome">Chrome</option>
            <option value="Firefox">Firefox</option>
            <option value="edge">Edge</option>
            <option value="brave">Brave</option>
            <option value="other">Other</option>  

        </select>
        <label for="pet">Do you have a household pet?</label>
        <input type="checkbox" id="pet" name="pet">
        <label for="feedback">List the places you have lived:</label>
        <textarea id="feedback" name="feedback" rows="4" placeholder="Kabwe, Zambia, Stillwater Florida, Amsterdam Netherlands"></textarea>
        <button type="submit">Submit Poll</button>
     </form>
</main>

<footer>

</footer>

</html>
